name: Deploy Storybook + Showcase to GitHub Pages

on:
  push:
    branches: [design-system-ui]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Single Pages site per repo. This builds BOTH outputs into one artifact:
#   - Storybook at the root:        /design-system/
#   - Showcase app under /showcase: /design-system/showcase/
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Storybook -> storybook-static (served at the Pages root)
      - run: npm run build-storybook

      # Showcase app -> dist, with assets prefixed for the /showcase subpath
      - run: npm run build
        env:
          BASE_PATH: /design-system/showcase/

      # Nest the app inside the Storybook output under /showcase
      - run: |
          mkdir -p storybook-static/showcase
          cp -r dist/. storybook-static/showcase/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
