name: Deploy Storybook + Showcase to GitHub Pages

on:
  push:
    branches: [main, stroybook-ui]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Storybook is served at the Pages root: /design-system/
      - run: npm run build-storybook

      # The showcase app is served under the /showcase subpath:
      # /design-system/showcase/  — set the Vite base so assets resolve there.
      - run: npm run build -- --base=/design-system/showcase/

      - name: Assemble Pages site (Storybook at /, showcase at /showcase)
        run: |
          rm -rf _site
          mkdir -p _site/showcase
          cp -r storybook-static/. _site/
          cp -r dist/. _site/showcase/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
